name: Nightly Product Scrape

# Runs every night at 2 AM UTC (3 AM CET)
# Can also be triggered manually from the GitHub Actions tab
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:  # allows manual trigger from GitHub UI

# Shared setup for all scraper jobs
env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

jobs:
  # Reusable setup: each job starts its own tunnel and runs one scraper
  kappahl:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Start tunnel and scrape
        run: |
          flyctl proxy 5432:5432 --app kappahl-qfix-db &
          for i in $(seq 1 30); do pg_isready -h localhost -p 5432 > /dev/null 2>&1 && break; sleep 1; done
          python main.py

  ginatricot:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Start tunnel and scrape
        run: |
          flyctl proxy 5432:5432 --app kappahl-qfix-db &
          for i in $(seq 1 30); do pg_isready -h localhost -p 5432 > /dev/null 2>&1 && break; sleep 1; done
          python ginatricot_main.py

  eton:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Start tunnel and scrape
        run: |
          flyctl proxy 5432:5432 --app kappahl-qfix-db &
          for i in $(seq 1 30); do pg_isready -h localhost -p 5432 > /dev/null 2>&1 && break; sleep 1; done
          python eton_main.py

  nudie:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Start tunnel and scrape
        run: |
          flyctl proxy 5432:5432 --app kappahl-qfix-db &
          for i in $(seq 1 30); do pg_isready -h localhost -p 5432 > /dev/null 2>&1 && break; sleep 1; done
          python nudie_main.py

  lindex:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Start tunnel and scrape
        run: |
          flyctl proxy 5432:5432 --app kappahl-qfix-db &
          for i in $(seq 1 30); do pg_isready -h localhost -p 5432 > /dev/null 2>&1 && break; sleep 1; done
          python lindex_main.py
