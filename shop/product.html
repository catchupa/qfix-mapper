<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KappAhl</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  color: #212121;
  background: #fff;
  line-height: 1.5;
}

a { color: inherit; text-decoration: none; }

/* ── Header ─────────────────────────────────────── */
.site-header {
  border-bottom: 1px solid #e5e5e5;
  background: #fff;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-inner {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  align-items: center;
  height: 64px;
  gap: 40px;
}
.logo {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  white-space: nowrap;
}
.header-nav { display: flex; gap: 28px; }
.header-nav a {
  font-size: 14px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 4px 0;
  border-bottom: 2px solid transparent;
  transition: border-color .2s;
}
.header-nav a:hover { border-bottom-color: #212121; }

.promo-banner {
  background: #212121;
  color: #fff;
  text-align: center;
  padding: 8px;
  font-size: 12px;
  letter-spacing: 0.5px;
}

/* ── Breadcrumb ────────────────────────────────── */
.breadcrumb {
  max-width: 1280px;
  margin: 0 auto;
  padding: 16px 24px;
  font-size: 13px;
  color: #888;
}
.breadcrumb a { color: #888; }
.breadcrumb a:hover { color: #212121; text-decoration: underline; }
.breadcrumb span { color: #212121; }

/* ── Product layout ────────────────────────────── */
.product-layout {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 24px 48px;
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 48px;
}
@media (max-width: 768px) {
  .product-layout {
    grid-template-columns: 1fr;
    gap: 24px;
  }
}

/* ── Image ─────────────────────────────────────── */
.product-image {
  aspect-ratio: 3/4;
  background: #f2f2f2;
  overflow: hidden;
  position: relative;
}
.product-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* ── Product info ──────────────────────────────── */
.product-info { padding-top: 8px; }

.product-name {
  font-size: 24px;
  font-weight: 400;
  margin-bottom: 8px;
  line-height: 1.3;
}
.product-price {
  font-size: 22px;
  font-weight: 600;
  margin-bottom: 20px;
}

.product-color {
  font-size: 14px;
  margin-bottom: 20px;
}
.product-color .color-label { color: #888; }
.color-swatch {
  display: inline-block;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 2px solid #212121;
  vertical-align: middle;
  margin-left: 8px;
  background: #888;
}

/* ── Size selector ─────────────────────────────── */
.size-section { margin-bottom: 24px; }
.size-label {
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.size-options { display: flex; gap: 8px; flex-wrap: wrap; }
.size-btn {
  min-width: 48px;
  height: 44px;
  border: 1px solid #ccc;
  background: #fff;
  font-size: 14px;
  font-family: inherit;
  cursor: pointer;
  transition: all .15s;
  padding: 0 12px;
}
.size-btn:hover { border-color: #212121; }
.size-btn.selected {
  border-color: #212121;
  background: #212121;
  color: #fff;
}

/* ── Add to cart ───────────────────────────────── */
.add-to-cart {
  width: 100%;
  padding: 14px 20px;
  background: #1a1a1a;
  color: #fff;
  border: none;
  border-radius: 32px;
  font-size: 15px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  margin-bottom: 24px;
  transition: background 0.15s;
}
.add-to-cart:hover { background: #333; }

/* ── QFix services section ─────────────────────── */
.qfix-section {
  border: 1px solid #e5e5e5;
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 24px;
  background: #fafafa;
}
.qfix-section-title {
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #555;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.qfix-section-title svg {
  width: 16px;
  height: 16px;
  color: #4CAF50;
}
.qfix-powered {
  text-align: center;
  font-size: 11px;
  color: #aaa;
  margin-top: 10px;
  letter-spacing: 0.3px;
}

/* ── Accordions ────────────────────────────────── */
.accordion-section {
  border-top: 1px solid #e5e5e5;
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 24px;
}
.accordion {
  border-bottom: 1px solid #e5e5e5;
}
.accordion-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 0;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  user-select: none;
}
.accordion-header:hover { color: #555; }
.accordion-header .chevron {
  transition: transform .2s;
  font-size: 18px;
  color: #888;
}
.accordion.open .accordion-header .chevron { transform: rotate(180deg); }
.accordion-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height .3s ease;
}
.accordion.open .accordion-body {
  max-height: 500px;
}
.accordion-content {
  padding: 0 0 18px;
  font-size: 14px;
  color: #555;
  line-height: 1.7;
}

/* ── Footer ────────────────────────────────────── */
.site-footer {
  background: #f2f2f2;
  padding: 32px 24px;
  text-align: center;
  font-size: 12px;
  color: #888;
  border-top: 1px solid #e5e5e5;
  margin-top: 48px;
}

/* ── Loading ───────────────────────────────────── */
.loading {
  text-align: center;
  padding: 120px 24px;
  color: #888;
}
.loading::after {
  content: '';
  display: block;
  width: 32px;
  height: 32px;
  margin: 16px auto 0;
  border: 3px solid #e5e5e5;
  border-top-color: #212121;
  border-radius: 50%;
  animation: spin .6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.error-state {
  text-align: center;
  padding: 120px 24px;
  color: #888;
}
</style>
</head>
<body>

<div class="promo-banner">Fri frakt vid köp över 500 kr &nbsp;|&nbsp; Gratis returer i butik</div>

<header class="site-header">
  <div class="header-inner">
    <a href="/shop/kappahl/" class="logo">KappAhl</a>
    <nav class="header-nav">
      <a href="/shop/kappahl/?cat=dam">Dam</a>
      <a href="/shop/kappahl/?cat=herr">Herr</a>
      <a href="/shop/kappahl/?cat=barn">Barn</a>
      <a href="/shop/kappahl/?cat=baby">Baby</a>
    </nav>
  </div>
</header>

<div id="content">
  <div class="loading" id="loading">Laddar produkt...</div>
</div>

<footer class="site-footer">
  Demo – KappAhl &times; QFix &nbsp;|&nbsp; Hållbarhetstjänster integrerade i butiken
</footer>

<script>
const productId = window.location.pathname.split('/').pop();

function fakePrice(id) {
  let h = 0;
  for (let i = 0; i < id.length; i++) h = ((h << 5) - h + id.charCodeAt(i)) | 0;
  const prices = [199, 249, 299, 349, 399, 449, 499, 599, 699, 799, 899];
  return prices[Math.abs(h) % prices.length];
}

function colorToHex(colorName) {
  const map = {
    'svart': '#222', 'black': '#222', 'vit': '#fff', 'white': '#fff',
    'blå': '#2962FF', 'blue': '#2962FF', 'marinblå': '#1a237e',
    'röd': '#D44333', 'red': '#D44333', 'rosa': '#E91E63', 'pink': '#E91E63',
    'grön': '#388E3C', 'green': '#388E3C', 'grå': '#9E9E9E', 'grey': '#9E9E9E',
    'brun': '#795548', 'brown': '#795548', 'beige': '#D7CCC8',
    'gul': '#FDD835', 'yellow': '#FDD835', 'orange': '#FF9800',
    'lila': '#7B1FA2', 'purple': '#7B1FA2', 'multi': 'linear-gradient(135deg,#E91E63,#2962FF,#388E3C)',
  };
  if (!colorName) return '#888';
  const lower = colorName.toLowerCase();
  for (const [k, v] of Object.entries(map)) {
    if (lower.includes(k)) return v;
  }
  return '#888';
}

async function loadProduct() {
  try {
    const res = await fetch(`/docs/verify/${productId}`);
    if (!res.ok) throw new Error('Not found');
    const data = await res.json();
    render(data);
  } catch (err) {
    document.getElementById('content').innerHTML = `
      <div class="error-state">
        <p>Produkten kunde inte hittas.</p>
        <p style="margin-top:16px"><a href="/shop/kappahl/" style="color:#D44333;text-decoration:underline">Tillbaka till butiken</a></p>
      </div>`;
  }
}

function render(data) {
  const p = data.product;
  const m = data.mapping;

  const price = fakePrice(p.product_id);
  const colorHex = colorToHex(p.category); // category often has color info for kappahl
  const imgSrc = p.image_url || '';

  document.title = `${p.product_name || 'Produkt'} – KappAhl`;

  // Determine category from the product category field
  let catLabel = '';
  const cat = (p.category || '').toLowerCase();
  if (cat.includes('dam') || cat.includes('kvinn')) catLabel = 'Dam';
  else if (cat.includes('herr') || cat.includes('man') || cat.includes('män')) catLabel = 'Herr';
  else if (cat.includes('barn') || cat.includes('kid') || cat.includes('flick') || cat.includes('pojk')) catLabel = 'Barn';
  else if (cat.includes('baby') || cat.includes('beb')) catLabel = 'Baby';

  const hasAnyService = m.qfix_url;

  let html = `
    <nav class="breadcrumb">
      <a href="/shop/kappahl/">Hem</a> &rsaquo;
      ${catLabel ? `<a href="/shop/kappahl/?cat=${catLabel.toLowerCase()}">${catLabel}</a> &rsaquo;` : ''}
      ${p.clothing_type ? `<a href="/shop/kappahl/">${p.clothing_type}</a> &rsaquo;` : ''}
      <span>${p.product_name || ''}</span>
    </nav>

    <div class="product-layout">
      <div class="product-image">
        ${imgSrc ? `<img src="${imgSrc}" alt="${(p.product_name||'').replace(/"/g,'&quot;')}" onerror="this.style.display='none'">` : ''}
      </div>

      <div class="product-info">
        <h1 class="product-name">${p.product_name || ''}</h1>
        <div class="product-price">${price} kr</div>

        ${p.category ? `
        <div class="product-color">
          <span class="color-label">Färg:</span>
          <span class="color-swatch" style="background:${colorHex}"></span>
          <span style="margin-left:4px">${p.category}</span>
        </div>` : ''}

        <div class="size-section">
          <div class="size-label">Storlek</div>
          <div class="size-options">
            <button class="size-btn">XS</button>
            <button class="size-btn selected">S</button>
            <button class="size-btn">M</button>
            <button class="size-btn">L</button>
            <button class="size-btn">XL</button>
          </div>
        </div>

        <button class="add-to-cart">Lägg i varukorgen</button>

        ${hasAnyService ? `
        <div class="qfix-section">
          <div class="qfix-section-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="M8 12l2 2 4-4"/></svg>
            Hållbarhetstjänster
          </div>
          <div data-qfix data-product-id="${p.product_id}" data-brand="kappahl"></div>
          <div class="qfix-powered">Hållbarhetstjänster via QFix</div>
        </div>` : ''}
      </div>
    </div>

    <div class="accordion-section">
      <div class="accordion open">
        <div class="accordion-header" onclick="this.parentElement.classList.toggle('open')">
          Produktbeskrivning
          <span class="chevron">▾</span>
        </div>
        <div class="accordion-body">
          <div class="accordion-content">
            ${p.description || 'Ingen beskrivning tillgänglig.'}
          </div>
        </div>
      </div>

      <div class="accordion">
        <div class="accordion-header" onclick="this.parentElement.classList.toggle('open')">
          Material & Sammansättning
          <span class="chevron">▾</span>
        </div>
        <div class="accordion-body">
          <div class="accordion-content">
            ${m.material_input || 'Ingen materialinformation tillgänglig.'}
          </div>
        </div>
      </div>

      ${hasAnyService ? `
      <div class="accordion">
        <div class="accordion-header" onclick="this.parentElement.classList.toggle('open')">
          QFix Mappning (demo)
          <span class="chevron">▾</span>
        </div>
        <div class="accordion-body">
          <div class="accordion-content">
            <strong>Plaggtyp:</strong> ${m.clothing_type_input || '–'} &rarr; ${m.clothing_type_result || '–'} (ID: ${m.clothing_type_id || '–'})<br>
            <strong>Material:</strong> ${m.material_input || '–'} &rarr; ${m.material_result || '–'} (ID: ${m.material_id || '–'})<br>
            <strong>Kategori:</strong> ${m.subcategory || '–'}<br>
            <strong>QFix URL:</strong> ${m.qfix_url ? `<a href="${m.qfix_url}" style="color:#D44333;text-decoration:underline" target="_blank">Öppna i QFix</a>` : '–'}
          </div>
        </div>
      </div>` : ''}
    </div>
  `;

  document.getElementById('content').innerHTML = html;

  // Size button interaction
  document.querySelectorAll('.size-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    });
  });

  // Load QFix widget after DOM is updated
  const widgetScript = document.createElement('script');
  widgetScript.src = '/widget/v1.js';
  document.body.appendChild(widgetScript);
}

loadProduct();
</script>
</body>
</html>
